name: Run Unit Tests

on:
  pull_request:
    branches:
      - master

jobs:
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check branch is up to date with master
        run: |
          git fetch origin master
          BASE=$(git merge-base HEAD origin/master)
          if [ "$BASE" != "$(git rev-parse origin/master)" ]; then
            echo "Branch is behind master. Please rebase before running tests."
            exit 1
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm test
